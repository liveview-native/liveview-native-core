[package]
name = "liveview-native-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
description.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
categories.workspace = true
keywords.workspace = true
license-file.workspace = true
readme.workspace = true
publish.workspace = true

build = "build.rs"

[lib]
crate-type = ["staticlib", "rlib"]

[features]
default = []
native-tls = ["phoenix_channels_client/native-tls", "reqwest/native-tls"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0"
cranelift-entity = "0.87"
fixedbitset = "0.4"
fxhash = "0.2"
html5gum = { git = "https://github.com/liveviewnative/html5gum", branch = "lvn" }
intrusive-collections = { version = "0.9", features = ["nightly"] }
indexmap = { version = "1.7", features = ["std"] }
lazy_static = "1.4"
parking_lot = "0.12"
paste = "1.0"
petgraph = { version = "0.6", default-features = false, features = ["graphmap"] }
phoenix_channels_client = "0.1"
reqwest = { version = "0.11", features = ["cookies", "gzip"] }
rustc-hash = "1.1"
serde_json = "1.0"
smallvec = { version = "1.9", features = ["union", "const_generics", "specialization"] }
smallstr = { version = "0.3", features = ["union"] }
thiserror = "1.0"
tokio = { version = "1.21", features = ["rt"] }
url = "2.3"

[build-dependencies]
Inflector = "0.11"
